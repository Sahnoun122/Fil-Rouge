name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Job pour tester et builder le projet
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json

    # Backend Tests
    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci

    - name: Lint Backend
      run: |
        cd backend
        npm run lint

    - name: Build Backend
      run: |
        cd backend
        npm run build

    - name: Test Backend
      run: |
        cd backend
        npm run test
      env:
        DATABASE_URL: mongodb://localhost:27017/test
        JWT_SECRET: test-secret
        NODE_ENV: test

    # Frontend Tests
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Lint Frontend
      run: |
        cd frontend
        npm run lint

    - name: Build Frontend
      run: |
        cd frontend
        npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:3000

  # Job pour construire et pousser les images Docker
  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub (optionnel)
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ env.DOCKER_PASSWORD }}
      if: env.DOCKER_USERNAME != ''

    - name: Build Backend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        target: production
        push: ${{ env.DOCKER_USERNAME != '' }}
        tags: |
          ${{ env.DOCKER_USERNAME }}/marketplan-backend:latest
          ${{ env.DOCKER_USERNAME }}/marketplan-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Frontend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        target: production
        push: ${{ env.DOCKER_USERNAME != '' }}
        tags: |
          ${{ env.DOCKER_USERNAME }}/marketplan-frontend:latest
          ${{ env.DOCKER_USERNAME }}/marketplan-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Job de déploiement (optionnel)
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Server (exemple)
      run: |
        echo "🚀 Déploiement en production"
        echo "Docker images construites avec succès:"
        echo "- Backend: ${{ env.DOCKER_USERNAME }}/marketplan-backend:${{ github.sha }}"
        echo "- Frontend: ${{ env.DOCKER_USERNAME }}/marketplan-frontend:${{ github.sha }}"
        # Ici vous pouvez ajouter vos commandes de déploiement
        # Exemple: ssh, scp, docker-compose pull && up, etc.

    - name: Notification Success
      run: |
        echo "✅ Pipeline CI/CD terminé avec succès!"
        echo "🔗 Frontend: https://votre-domaine.com"
        echo "🔗 API: https://api.votre-domaine.com"